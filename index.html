<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCode - TI UMY</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(20, 35, 25, 0.18), rgba(20, 35, 25, 0.35)),
        url("assets/background.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: white;
    }

    .phone-wrapper {
      width: 100%;
      max-width: 430px;
      min-height: 760px;
      border-radius: 42px;
      padding: 26px 22px;
      background: rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      box-shadow:
        0 25px 70px rgba(0, 0, 0, 0.35),
        inset 0 0 25px rgba(255, 255, 255, 0.20);
      position: relative;
      overflow: hidden;
    }

    .phone-wrapper::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 36px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .profile-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      margin: 0 auto 22px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.20);
      font-size: 24px;
    }

    .search-box {
      height: 54px;
      border-radius: 999px;
      padding: 0 20px;
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.92);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .search-box span {
      font-size: 15px;
      letter-spacing: 0.2px;
    }

    .hero-card {
      border-radius: 34px;
      padding: 28px 24px;
      min-height: 190px;
      background: rgba(255, 255, 255, 0.22);
      border: 1.5px solid rgba(255, 255, 255, 0.58);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.18),
        inset 0 0 22px rgba(255, 255, 255, 0.15);
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      color: #6da51f;
      font-size: 34px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
    }

    .brand-text h1 {
      font-size: 32px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .brand-text p {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.92);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-bar {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .progress-fill {
      width: 58%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #a6db49, #d4ff7a);
      box-shadow: 0 0 14px rgba(190, 255, 90, 0.9);
    }

    .time {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
    }

    .menu-panel {
      border-radius: 38px;
      padding: 32px 20px 28px;
      background: rgba(255, 255, 255, 0.24);
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      box-shadow:
        inset 0 0 28px rgba(255, 255, 255, 0.12),
        0 18px 45px rgba(0, 0, 0, 0.22);
    }

    .sparkle {
      text-align: center;
      margin-bottom: 24px;
      font-size: 20px;
      color: white;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.95);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px 16px;
    }

    .menu-btn {
      text-decoration: none;
      color: white;
      text-align: center;
      display: block;
      transition: 0.25s ease;
    }

    .menu-btn:hover {
      transform: translateY(-5px) scale(1.03);
    }

    .icon-box {
      width: 86px;
      height: 86px;
      margin: 0 auto 10px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.22);
      border: 1.5px solid rgba(255, 255, 255, 0.62);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow:
        0 10px 25px rgba(0, 0, 0, 0.18),
        inset 0 0 18px rgba(255, 255, 255, 0.14);
    }

    .menu-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.84);
    }

    .footer b {
      color: white;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .phone-wrapper {
        min-height: 100vh;
        border-radius: 32px;
        padding: 22px 16px;
      }

      .hero-card {
        padding: 24px 20px;
      }

      .brand-logo {
        width: 56px;
        height: 56px;
        font-size: 30px;
      }

      .brand-text h1 {
        font-size: 28px;
      }

      .icon-box {
        width: 76px;
        height: 76px;
        font-size: 34px;
        border-radius: 23px;
      }

      .menu-grid {
        gap: 22px 10px;
      }

      .menu-title {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="phone-wrapper">

    <div class="profile-icon">👤</div>

    <div class="search-box">
      <span>Running text</span>
      <span>🔍</span>
    </div>

    <section class="hero-card">
      <div class="brand">
        <div class="brand-logo">TI</div>
        <div class="brand-text">
          <h1>MyCode</h1>
          <p>Decoding Your<br>Academic Journey</p>
        </div>
      </div>

      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="time">08:59 WIB</div>
      </div>
    </section>

    <section class="menu-panel">
      <div class="sparkle">✦</div>

      <div class="menu-grid">

        <a class="menu-btn" href="jadwal-dosen.html">
          <div class="icon-box">📅</div>
          <div class="menu-title">Jadwal<br>Dosen</div>
        </a>

        <a class="menu-btn" href="ruang-kuliah.html">
          <div class="icon-box">🏠</div>
          <div class="menu-title">Ruang<br>Kuliah</div>
        </a>

        <a class="menu-btn" href="agenda-prodi.html">
          <div class="icon-box">📋</div>
          <div class="menu-title">Agenda<br>Prodi</div>
        </a>

        <a class="menu-btn" href="kkn.html">
          <div class="icon-box">👥</div>
          <div class="menu-title">KKN</div>
        </a>

        <a class="menu-btn" href="magang.html">
          <div class="icon-box">🤖</div>
          <div class="menu-title">Magang</div>
        </a>

        <a class="menu-btn" href="skripsi.html">
          <div class="icon-box">📝</div>
          <div class="menu-title">Skripsi</div>
        </a>

      </div>
    </section>

    <div class="footer">
      Created by <b>@saykendi</b>
    </div>

  </main>
</body>
</html>
