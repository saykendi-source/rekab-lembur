<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCode - TI UMY</title>

  <style>
    :root {
      --white: rgba(255,255,255,.95);
      --soft-white: rgba(255,255,255,.82);
      --glass: rgba(255,255,255,.15);
      --glass-2: rgba(255,255,255,.22);
      --line: rgba(255,255,255,.34);
      --green: #c9f35e;
      --green2: #aedd42;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      color: var(--white);
      overflow-x: hidden;
      background:
        linear-gradient(rgba(235,242,248,.20), rgba(195,207,199,.30)),
        url("assets/bg-umy.jpg") center center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      background: rgba(255,255,255,.04);
      pointer-events: none;
    }

    .app {
      position: relative;
      width: min(92vw, 430px);
      min-height: 860px;
      padding: 24px 18px 24px;
      border-radius: 54px;
      background: rgba(255,255,255,.14);
      border: 2px solid rgba(255,255,255,.36);
      box-shadow: 0 28px 80px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.28);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      z-index: 1;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 44px;
      border: 1.5px solid rgba(255,255,255,.35);
      pointer-events: none;
      z-index: 2;
    }

    .profile {
      position: relative;
      z-index: 4;
      width: 62px;
      height: 62px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.17);
      border: 1px solid rgba(255,255,255,.32);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 10px 30px rgba(0,0,0,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .profile svg { width: 30px; height: 30px; fill: rgba(255,255,255,.88); }

    .top-panel {
      position: relative;
      z-index: 3;
      border-radius: 38px;
      padding: 22px 18px 26px;
      background: rgba(255,255,255,.13);
      border: 1.5px solid rgba(255,255,255,.24);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
    }

    .search {
      height: 56px;
      border-radius: 999px;
      padding: 0 20px;
      margin-bottom: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.11);
      border: 1.5px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.88);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .search span { font-size: 16px; font-weight: 500; }
    .search svg { width: 24px; height: 24px; stroke: rgba(255,255,255,.92); stroke-width: 2.6; }

    .hero {
      position: relative;
      min-height: 285px;
      border-radius: 36px;
      padding: 26px 24px 22px;
      background: rgba(255,255,255,.13);
      border: 1.8px solid rgba(255,255,255,.34);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 15px 36px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -54px;
      top: 102px;
      width: 116px;
      height: 205px;
      border-radius: 26px;
      background: rgba(255,255,255,.09);
      border: 1.3px solid rgba(255,255,255,.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .brand {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      margin-top: 50px;
    }

    .logo-wrap { width: 88px; height: 88px; flex: 0 0 88px; display: flex; align-items: center; justify-content: center; }
    .logo-wrap img { width: 88px; height: 88px; object-fit: contain; display: block; filter: drop-shadow(0 4px 10px rgba(0,0,0,.12)) brightness(1.08); }

    .brand-text h1 {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1px;
      color: rgba(255,255,255,.96);
      text-shadow: 0 2px 12px rgba(0,0,0,.10);
      margin-bottom: 12px;
    }

    .brand-text p { font-size: 17px; line-height: 1.32; font-weight: 500; color: rgba(255,255,255,.86); text-shadow: 0 2px 8px rgba(0,0,0,.08); }

    .progress-line { position: relative; z-index: 2; margin-top: 36px; display: flex; align-items: center; gap: 14px; }
    .progress { flex: 1; height: 11px; border-radius: 999px; background: rgba(255,255,255,.23); border: 1px solid rgba(255,255,255,.16); overflow: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,.18); }
    .progress div { width: 57%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--green2), #d9ff77); box-shadow: 0 0 18px rgba(201,243,94,.85); }
    .clock-widget { min-width: 112px; padding: 8px 12px; border-radius: 14px; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.18); box-shadow: inset 0 1px 0 rgba(255,255,255,.16); text-align: center; line-height: 1.15; }
    .clock-time { font-size: 18px; font-weight: 800; color: rgba(255,255,255,.95); letter-spacing: .5px; }
    .clock-zone { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.78); margin-top: 4px; letter-spacing: .9px; }

    .bottom-panel {
      position: relative;
      z-index: 4;
      margin-top: -18px;
      padding: 42px 16px 30px;
      border-radius: 44px 44px 36px 36px;
      background: rgba(255,255,255,.15);
      border: 1.7px solid rgba(255,255,255,.28);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 15px 36px rgba(0,0,0,.06);
    }

    .bottom-panel::before {
      content: "";
      position: absolute;
      left: 0;
      top: -36px;
      width: 76%;
      height: 76px;
      background: rgba(255,255,255,.15);
      border-top: 1.7px solid rgba(255,255,255,.28);
      border-left: 1.7px solid rgba(255,255,255,.28);
      border-right: 1.7px solid rgba(255,255,255,.20);
      border-radius: 0 40px 0 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: none;
    }

    .star { position: relative; z-index: 2; text-align: center; margin-bottom: 25px; font-size: 23px; color: rgba(255,255,255,.94); text-shadow: 0 0 13px rgba(255,255,255,.75); }
    .menu { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px 14px; }
    .menu a { display: block; text-decoration: none; color: #fff; text-align: center; -webkit-tap-highlight-color: transparent; transition: transform .22s ease, filter .22s ease; }
    .menu a:hover { transform: translateY(-5px); filter: brightness(1.08); }
    .menu a:active { transform: scale(.96); }

    .icon-card {
      width: 94px;
      height: 94px;
      margin: 0 auto 13px;
      border-radius: 29px;
      background: rgba(255,255,255,.15);
      border: 1.7px solid rgba(255,255,255,.34);
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.23), 0 10px 20px rgba(0,0,0,.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .icon-card svg { width: 58px; height: 58px; filter: drop-shadow(0 8px 10px rgba(0,0,0,.14)) drop-shadow(0 -1px 1px rgba(255,255,255,.25)); }
    .label { font-size: 16px; font-weight: 800; line-height: 1.28; color: rgba(255,255,255,.96); text-shadow: 0 2px 8px rgba(0,0,0,.14); }

    @media (max-width: 480px) {
      body { padding: 10px; align-items: flex-start; }
      .app { width: 100%; min-height: calc(100vh - 20px); border-radius: 42px; padding: 18px 14px 20px; }
      .app::before { inset: 10px; border-radius: 34px; }
      .profile { width: 54px; height: 54px; margin-bottom: 14px; }
      .top-panel { border-radius: 32px; padding: 18px 14px 22px; }
      .search { height: 52px; margin-bottom: 22px; }
      .hero { min-height: 255px; padding: 22px 18px; }
      .brand { margin-top: 42px; gap: 12px; }
      .logo-wrap { width: 72px; height: 72px; flex-basis: 72px; }
      .logo-wrap img { width: 72px; height: 72px; }
      .clock-widget { min-width: 96px; padding: 7px 10px; }
      .clock-time { font-size: 16px; }
      .brand-text h1 { font-size: 30px; }
      .brand-text p { font-size: 16px; }
      .bottom-panel { padding: 40px 12px 26px; }
      .menu { gap: 25px 8px; }
      .icon-card { width: 82px; height: 82px; border-radius: 25px; }
      .icon-card svg { width: 52px; height: 52px; }
      .label { font-size: 14px; }
    }
  </style>
</head>

  </main>
  <script>
    function updateClock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat("id-ID", {
        timeZone: "Asia/Jakarta",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now).replace(".", ":");
      document.getElementById("clock").textContent = time;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
