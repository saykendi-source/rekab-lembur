<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Lembur TI UMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-container" class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">Rekap Kegiatan Lembur</h1>
            <p id="user-id-display" class="text-xs text-slate-500 mt-2">Menghubungkan ke Firebase...</p>
        </header>

        <div class="card p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nama Pengguna</label>
                <div class="flex gap-2">
                    <input id="name-input" type="text" placeholder="Ketik nama..." class="w-full bg-slate-800 p-3 rounded-lg outline-none focus:ring-2 focus:ring-cyan-500 border border-slate-700">
                    <button id="load-rekap-btn" title="Sinkronisasi Data" class="bg-cyan-600 px-4 rounded-lg hover:bg-cyan-500 transition-all"><i class="fa-solid fa-sync"></i></button>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Unit Kerja</label>
                <input id="workunit-input" type="text" placeholder="Laboratorium IT UMY" class="w-full bg-slate-800 p-3 rounded-lg outline-none focus:ring-2 focus:ring-cyan-500 border border-slate-700">
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mb-6">
            <select id="month-select" class="flex-1 bg-slate-800 p-3 rounded-lg outline-none border border-slate-700"></select>
            <select id="year-select" class="flex-1 bg-slate-800 p-3 rounded-lg outline-none border border-slate-700"></select>
        </div>
        
        <div class="flex justify-center gap-2 mb-6 p-1 bg-slate-800 rounded-lg border border-slate-700">
            <button id="calendar-view-btn" class="w-full py-2 rounded-md transition-all">Kalender</button>
            <button id="summary-view-btn" class="w-full py-2 rounded-md transition-all">Rekap Bulanan</button>
        </div>

        <div id="content-area"></div>
    </div>

    <div id="print-preview-container" class="hidden bg-gray-200 p-8 min-h-screen text-black">
        <div class="max-w-4xl mx-auto bg-white shadow-lg p-8 rounded-lg">
            <button id="back-to-app-btn" class="bg-slate-700 text-white px-4 py-2 rounded mb-6 no-print">Kembali</button>
            <div id="print-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDu75rAPfChsFt7pWQHZS5EJC94vLMvBSg",
            authDomain: "ti-lembur.firebaseapp.com",
            projectId: "ti-lembur",
            storageBucket: "ti-lembur.firebasestorage.app",
            messagingSenderId: "884467832884",
            appId: "1:884467832884:web:38cebdb4ade5ef50abd261"
        };

        // LINK SUDAH DIPERBAIKI KE FORMAT CSV
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_I7uOP3lNEtsw6wRn1G_Kgybcs-3jOOF_iEggsz1csDp2nhIwYVSk0wEHA0Libg/pub?output=csv';

        const PUBLIC_HOLIDAYS = {
            "2025-05-01": "Hari Buruh", "2025-05-12": "Hari Waisak", "2025-05-29": "Kenaikan Yesus Kristus",
            "2026-05-01": "Hari Buruh", "2026-05-14": "Kenaikan Yesus Kristus", "2026-05-31": "Hari Waisak",
            "2025-01-01": "Tahun Baru", "2025-08-17": "Kemerdekaan RI", "2025-12-25": "Natal"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let activities = [], sheetKegiatan = [], userId = null, selectedDate = null, viewMode = 'calendar';
        let currentRekapName = localStorage.getItem('currentRekapName') || '';
        let workUnit = localStorage.getItem('activityTrackerWorkUnit') || '';
        let unsub = null;

        async function fetchSheetData() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const text = await res.text();
                // Parsing sederhana: ambil kolom pertama setiap baris
                sheetKegiatan = text.split('\n').map(row => {
                    const cols = row.split(',');
                    return cols[0].trim().replace(/"/g, '');
                }).filter(val => val && val !== "Kegiatan" && val !== "Daftar Kegiatan");
                console.log("Kegiatan berhasil dimuat dari Sheet");
            } catch (e) { console.error("Gagal memuat Google Sheets:", e); }
        }

        function render() {
            const calendarBtn = document.getElementById('calendar-view-btn');
            const summaryBtn = document.getElementById('summary-view-btn');
            calendarBtn.className = `w-full py-2 rounded-md ${viewMode === 'calendar' ? 'bg-cyan-500 font-bold' : 'hover:bg-slate-700 text-slate-400'}`;
            summaryBtn.className = `w-full py-2 rounded-md ${viewMode === 'summary' ? 'bg-cyan-500 font-bold' : 'hover:bg-slate-700 text-slate-400'}`;
            
            if (viewMode === 'calendar') renderCalendar(); else renderSummary();
        }

        function renderCalendar() {
            const m = parseInt(document.getElementById('month-select').value);
            const y = parseInt(document.getElementById('year-select').value);
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const firstDay = new Date(y, m, 1).getDay();
            const hasDataDates = new Set(activities.map(a => a.timestamp.toDateString()));
            
            let html = `<div class="grid grid-cols-7 gap-2 text-center text-slate-500 text-xs font-bold mb-4">
                <div>MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div>JUM</div><div>SAB</div>
            </div><div class="grid grid-cols-7 gap-2">`;
            
            for (let i = 0; i < firstDay; i++) html += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const curDate = new Date(y, m, d);
                const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const holidayName = PUBLIC_HOLIDAYS[dateKey];
                const isSunday = curDate.getDay() === 0;
                const isSelected = selectedDate && curDate.toDateString() === selectedDate.toDateString();

                let color = isSelected ? 'bg-cyan-500 text-white font-bold' : (holidayName || isSunday) ? 'text-red-400 bg-red-400/10 font-bold' : 'bg-slate-700/30 hover:bg-slate-700';

                html += `<div data-day="${d}" title="${holidayName || ''}" class="p-3 text-center rounded-xl cursor-pointer relative transition-all ${color}">
                    ${d}${hasDataDates.has(curDate.toDateString()) ? '<span class="absolute top-1 right-1 h-2 w-2 bg-amber-400 rounded-full border border-slate-800"></span>' : ''}
                </div>`;
            }
            document.getElementById('content-area').innerHTML = html + `</div>`;
            if (selectedDate) renderDailyInput();
            document.querySelectorAll('[data-day]').forEach(el => el.onclick = () => { 
                selectedDate = new Date(y, m, el.dataset.day); 
                render(); 
            });
        }

        function renderDailyInput() {
            const daily = activities.filter(a => a.timestamp.toDateString() === selectedDate.toDateString());
            let html = `<div class="mt-8 border-t border-slate-700 pt-6 animate-fade-in">
                <h2 class="text-xl font-bold text-cyan-400 mb-4">${selectedDate.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'})}</h2>
                <form id="add-form" class="card p-5 grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="md:col-span-3">
                        <label class="text-xs text-slate-400 block mb-1">Detail Kegiatan (Otomatis dari Sheet)</label>
                        <input id="inp-text" list="kegiatan-list" class="w-full bg-slate-800 p-3 rounded-lg outline-none border border-slate-700 focus:border-cyan-500" placeholder="Pilih atau ketik kegiatan...">
                        <datalist id="kegiatan-list">${sheetKegiatan.map(k => `<option value="${k}">`).join('')}</datalist>
                    </div>
                    <input id="inp-start" type="time" class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <input id="inp-end" type="time" class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <button type="submit" id="btn-save" class="bg-cyan-500 hover:bg-cyan-400 py-3 rounded-lg font-bold">Simpan</button>
                </form>
                <div class="space-y-3">`;
            
            daily.forEach(a => {
                html += `<div class="card p-4 flex justify-between items-center border-slate-700">
                    <div><p class="font-medium">${a.text}</p><p class="text-xs text-amber-400 font-semibold">${a.overtimeStart || '-'} s/d ${a.overtimeEnd || '-'}</p></div>
                    <button onclick="deleteAct('${a.id}')" class="text-slate-500 hover:text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
            document.getElementById('content-area').innerHTML += html + `</div></div>`;
            document.getElementById('add-form').onsubmit = handleAdd;
        }

        async function handleAdd(e) {
            e.preventDefault();
            const text = document.getElementById('inp-text').value;
            const start = document.getElementById('inp-start').value;
            const end = document.getElementById('inp-end').value;
            const saveBtn = document.getElementById('btn-save');

            if (!text || !currentRekapName || !userId) {
                alert("PENTING: Masukkan Nama di atas lalu klik tombol biru (Sinkron) dulu!");
                return;
            }
            
            try {
                saveBtn.disabled = true; saveBtn.innerText = "Proses...";
                await db.collection(`users/${userId}/rekaps/${currentRekapName}/activities`).add({
                    text: text,
                    overtimeStart: start,
                    overtimeEnd: end,
                    timestamp: firebase.firestore.Timestamp.fromDate(new Date(selectedDate))
                });
                document.getElementById('inp-text').value = "";
            } catch (err) {
                alert("Gagal Simpan: " + err.message);
            } finally {
                saveBtn.disabled = false; saveBtn.innerText = "Simpan";
            }
        }

        window.deleteAct = async (id) => {
            if(confirm("Hapus data ini?")) await db.collection(`users/${userId}/rekaps/${currentRekapName}/activities`).doc(id).delete();
        }

        function renderSummary() {
            const m = parseInt(document.getElementById('month-select').value);
            const y = parseInt(document.getElementById('year-select').value);
            document.getElementById('content-area').innerHTML = `<div class="card p-8 text-center animate-fade-in">
                <h3 class="text-2xl font-bold text-cyan-400 mb-6">Rekap ${monthNames[m]} ${y}</h3>
                <button onclick="showPrintPreview()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-lg font-bold"><i class="fa-solid fa-print mr-2"></i> Pratinjau Cetak</button>
            </div>`;
        }

        window.showPrintPreview = () => {
            const m = parseInt(document.getElementById('month-select').value);
            const y = parseInt(document.getElementById('year-select').value);
            const ot = activities.filter(a => a.timestamp.getMonth() === m && a.timestamp.getFullYear() === y).sort((a,b) => a.timestamp - b.timestamp);
            
            let p = `<div class="text-center border-b-2 border-black pb-4 mb-6"><h1 class="text-xl font-bold uppercase">Rekapitulasi Lembur</h1><h2>Bulan ${monthNames[m]} ${y}</h2></div>
                     <p class="mb-4"><b>Nama:</b> ${currentRekapName} | <b>Unit:</b> ${workUnit}</p>
                     <table class="w-full border-collapse border border-black text-sm">
                        <thead><tr class="bg-gray-100"><th class="border border-black p-2">Tanggal</th><th class="border border-black p-2">Kegiatan</th><th class="border border-black p-2">Waktu</th></tr></thead><tbody>`;
            ot.forEach(a => {
                p += `<tr><td class="border border-black p-2">${a.timestamp.toLocaleDateString('id-ID')}</td><td class="border border-black p-2">${a.text}</td><td class="border border-black p-2 text-center">${a.overtimeStart}-${a.overtimeEnd}</td></tr>`;
            });
            document.getElementById('print-content').innerHTML = p + `</tbody></table>`;
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('print-preview-container').classList.remove('hidden');
        };

        async function init() {
            await fetchSheetData();
            document.getElementById('name-input').value = currentRekapName;
            document.getElementById('workunit-input').value = workUnit;

            const now = new Date();
            const mSelect = document.getElementById('month-select'), ySelect = document.getElementById('year-select');
            ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"].forEach((m, i) => mSelect.innerHTML += `<option value="${i}" ${i===now.getMonth()?'selected':''}>${m}</option>`);
            for(let y=2024; y<=2026; y++) ySelect.innerHTML += `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`;

            document.getElementById('load-rekap-btn').onclick = () => {
                const name = document.getElementById('name-input').value.trim();
                if(name) {
                    currentRekapName = name;
                    localStorage.setItem('currentRekapName', name);
                    startListening();
                    alert("Data sinkron untuk: " + name);
                } else alert("Ketik nama dulu!");
            };
            
            document.getElementById('workunit-input').oninput = (e) => {
                workUnit = e.target.value; localStorage.setItem('activityTrackerWorkUnit', workUnit);
            };

            document.getElementById('calendar-view-btn').onclick = () => { viewMode = 'calendar'; render(); };
            document.getElementById('summary-view-btn').onclick = () => { viewMode = 'summary'; render(); };
            document.getElementById('back-to-app-btn').onclick = () => { 
                document.getElementById('app-container').classList.remove('hidden'); 
                document.getElementById('print-preview-container').classList.add('hidden'); 
            };

            auth.onAuthStateChanged(async (user) => {
                if (!user) await auth.signInAnonymously();
                userId = auth.currentUser.uid;
                document.getElementById('user-id-display').textContent = `Cloud Sync Aktif (ID: ${userId.substring(0,6)})`;
                startListening();
            });
            
            mSelect.onchange = render; ySelect.onchange = render;
        }

        function startListening() {
            if (unsub) unsub();
            if (!userId || !currentRekapName) return;
            unsub = db.collection(`users/${userId}/rekaps/${currentRekapName}/activities`).onSnapshot(s => {
                activities = s.docs.map(d => ({id: d.id, ...d.data(), timestamp: d.data().timestamp.toDate()}));
                render();
            });
        }

        init();
    </script>
</body>
</html>
