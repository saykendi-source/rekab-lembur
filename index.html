<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Lembur TI UMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">Rekap Kegiatan Lembur</h1>
            <p id="status-id" class="text-xs text-slate-500 mt-2">Menghubungkan...</p>
        </header>

        <div class="card p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nama Rekap</label>
                <div class="flex gap-2">
                    <input id="name-input" type="text" class="w-full bg-slate-800 p-3 rounded-lg outline-none focus:ring-2 focus:ring-cyan-500">
                    <button id="btn-load" class="bg-cyan-600 px-4 rounded-lg hover:bg-cyan-500"><i class="fa-solid fa-sync"></i></button>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Unit Kerja</label>
                <input id="unit-input" type="text" class="w-full bg-slate-800 p-3 rounded-lg outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
        </div>

        <div class="card p-6 mb-6">
            <h2 class="text-cyan-400 font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> Tambah Kegiatan</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-3">
                    <label class="text-xs text-slate-400 block mb-1">Detail Kegiatan (Otomatis dari Sheet)</label>
                    <input id="act-text" list="sheet-data" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-cyan-500" placeholder="Pilih atau ketik kegiatan...">
                    <datalist id="sheet-data"></datalist>
                </div>
                <input id="act-start" type="time" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none">
                <input id="act-end" type="time" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none">
                <button id="btn-add" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold rounded-lg transition-all">Simpan</button>
            </div>
        </div>

        <div id="display-area" class="card p-6">
            <p class="text-center text-slate-500">Masukkan nama dan klik tombol biru di atas untuk memuat data.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // CONFIG KONFIGURASI
        const firebaseConfig = {
            apiKey: "AIzaSyDu75rAPfChsFt7pWQHZS5EJC94vLMvBSg",
            authDomain: "ti-lembur.firebaseapp.com",
            projectId: "ti-lembur",
            storageBucket: "ti-lembur.firebasestorage.app",
            messagingSenderId: "884467832884",
            appId: "1:884467832884:web:38cebdb4ade5ef50abd261"
        };
        
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_I7uOP3lNEtsw6wRn1G_Kgybcs-3jOOF_iEggsz1csDp2nhIwYVSk0wEHA0Libg/pub?output=csv';

        // Inisialisasi
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userId, currentName;

        // Ambil data Google Sheets
        async function loadSheet() {
            try {
                const res = await fetch(SHEET_URL);
                const data = await res.text();
                const list = data.split('\n').map(r => r.trim()).filter(r => r && r !== "Kegiatan");
                document.getElementById('sheet-data').innerHTML = list.map(item => `<option value="${item}">`).join('');
            } catch (e) { console.error("Gagal load spreadsheet"); }
        }

        // Simpan Data
        document.getElementById('btn-add').onclick = async () => {
            const text = document.getElementById('act-text').value;
            if(!text || !currentName) return alert("Isi nama rekap dan kegiatan!");
            
            await db.collection(`users/${userId}/rekaps/${currentName}/activities`).add({
                text: text,
                overtimeStart: document.getElementById('act-start').value,
                overtimeEnd: document.getElementById('act-end').value,
                timestamp: firebase.firestore.Timestamp.now()
            });
            document.getElementById('act-text').value = "";
            alert("Berhasil disimpan ke Firestore!");
        };

        // Login & Init
        auth.onAuthStateChanged(async (user) => {
            if (!user) await auth.signInAnonymously();
            userId = auth.currentUser.uid;
            document.getElementById('status-id').innerText = `Tersambung (ID: ${userId})`;
            loadSheet();
        });

        document.getElementById('btn-load').onclick = () => {
            currentName = document.getElementById('name-input').value.trim();
            if(currentName) alert("Data rekap untuk " + currentName + " siap.");
        };
    </script>
</body>
</html>
